# ============================================================
# hostapd.conf — Sunset Cam WiFi captive-portal AP
# ⚠️  HARDWARE-GATED: values below may need tuning on the Pi.
#    - interface: confirm wlan0 is the name on your Pi
#      (check: `ip link show`; Pi Zero 2 W is typically wlan0)
#    - channel: 6 works for most regions; change if there is
#      interference or a regulatory constraint
#    - country_code: set to your 2-letter ISO country code
# ============================================================

interface=wlan0
driver=nl80211

# The XXXX suffix is substituted at boot by the ExecStartPre
# in sunset-cam-setup.service using the last 4 hex chars of
# the wlan0 MAC address. The substituted conf is written to
# /run/hostapd-setup.conf, never back here.
ssid=Sunset-Cam-XXXX

hw_mode=g
channel=6
auth_algs=1
ignore_broadcast_ssid=0

# ⚠️  OPEN NETWORK — no wpa= line on purpose.
# The credentials we collect via the captive portal are for
# the recipient's HOME WiFi, not for this AP. Leaving this
# network open lets phones auto-pop the captive-portal sheet.

# Optional tuning:
# country_code=US
