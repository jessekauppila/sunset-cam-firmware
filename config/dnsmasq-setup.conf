# ============================================================
# dnsmasq-setup.conf — DHCP + captive-portal DNS for AP mode
# ⚠️  HARDWARE-GATED: values below may need tuning on the Pi.
#    - interface: must match hostapd.conf (default: wlan0)
#    - AP_IP: the static IP assigned to wlan0 by ExecStartPre
#      in sunset-cam-setup.service (default: 10.42.0.1);
#      if you change it here, change it there too, and in
#      the Flask catch-all redirect in setup_app.py.
#    - dhcp-range: stay in the 10.42.0.x/24 subnet
# ============================================================

interface=wlan0
bind-interfaces

# DHCP pool for phones connecting to the AP.
# Lease 12 h — long enough to survive a slow user; short
# enough not to pollute if the AP is restarted.
dhcp-range=10.42.0.50,10.42.0.150,255.255.255.0,12h

# Tell clients the AP itself is the gateway and DNS server.
dhcp-option=3,10.42.0.1
dhcp-option=6,10.42.0.1

# Captive-portal DNS hijack: resolve EVERY hostname to the
# device's AP IP so iOS /generate_204 and Android
# connectivitycheck probes hit our Flask portal and trigger
# the system captive-portal sheet automatically.
address=/#/10.42.0.1
